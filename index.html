<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MiniTV – NBC New York</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FAVICON -->
<link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='10' y='20' width='80' height='55' rx='10' fill='%23667eea'/%3E%3Crect x='18' y='28' width='64' height='39' rx='6' fill='black'/%3E%3Crect x='45' y='75' width='10' height='10' fill='%23667eea'/%3E%3C/svg%3E">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  min-height:100%;
  background:radial-gradient(circle at top,#1a1a2e,#050507);
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
  color:#fff;
}

/* LAYOUT */
.app{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding:clamp(12px,2vw,32px);
  gap:18px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:clamp(22px,2.5vw,30px);
  font-weight:700;
  background:linear-gradient(135deg,#667eea,#764ba2);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CLOCK – BIG & BOXED */
.clock{
  display:flex;
  gap:12px;
}

.time-box{
  padding:10px 16px;
  border-radius:14px;
  background:linear-gradient(
    145deg,
    rgba(0,0,0,.65),
    rgba(30,30,60,.65)
  );
  backdrop-filter:blur(12px);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.1),
    0 10px 25px rgba(0,0,0,.45);
  text-align:center;
}

.label{
  font-size:11px;
  letter-spacing:1.2px;
  opacity:.7;
}

.time{
  font-size:20px;
  font-weight:700;
  margin-top:2px;
}

/* FRAME */
.frame{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* TV */
.tv-frame{
  aspect-ratio:16/9;
  padding:16px;
  border-radius:26px;
  background:linear-gradient(145deg,#0f1116,#050507);
  box-shadow:
    0 40px 80px rgba(0,0,0,.8),
    inset 0 0 0 1px rgba(255,255,255,.08);
}

.screen{
  width:100%;
  height:100%;
  background:black;
  border-radius:18px;
  overflow:hidden;
  position:relative;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* CHANNEL BADGE */
.channel-badge{
  position:absolute;
  bottom:16px;
  left:16px;
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px 12px;
  border-radius:14px;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(12px);
}

.live-dot{
  width:9px;
  height:9px;
  background:#ef4444;
  border-radius:50%;
  box-shadow:0 0 10px #ef4444;
}

.channel{
  font-size:13px;
  font-weight:600;
}

/* RESPONSIVE */
.desktop .tv-frame{width:min(96vw,1400px);transform:translateY(-24px)}
.laptop  .tv-frame{width:min(96vw,calc(100vh*1.77))}
</style>
</head>

<body>
<div class="app" id="app">

  <div class="header">
    <div class="logo">MiniTV</div>

    <div class="clock">
      <div class="time-box">
        <div class="label">LOCAL</div>
        <div class="time" id="localTime">--</div>
      </div>
      <div class="time-box">
        <div class="label">NEW YORK</div>
        <div class="time" id="nyTime">--</div>
      </div>
    </div>
  </div>

  <div class="frame">
    <div class="tv-frame">
      <div class="screen">

        <iframe
          src="https://www.nbcnewyork.com/video-layout/amp_video/?noid=1:2:5351877&autoplay=true&muted=true"
          allow="autoplay; fullscreen"
          allowfullscreen>
        </iframe>

        <div class="channel-badge">
          <div class="live-dot"></div>
          <div class="channel">NBC New York</div>
        </div>

      </div>
    </div>
  </div>

</div>

<script>
function tick(){
  const n=new Date();
  localTime.textContent=n.toLocaleTimeString([],{
    hour:'2-digit',minute:'2-digit',hour12:true
  });
  nyTime.textContent=n.toLocaleTimeString('en-US',{
    timeZone:'America/New_York',
    hour:'2-digit',minute:'2-digit',hour12:true
  });
}
setInterval(tick,1000);tick();

function detect(){
  app.classList.toggle('laptop',innerHeight<=850);
  app.classList.toggle('desktop',innerHeight>850);
}
detect();addEventListener('resize',detect);
</script>

</body>
</html>
